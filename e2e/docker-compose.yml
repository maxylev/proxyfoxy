services:
  server:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.e2e
    privileged: true
    networks:
      - proxyfoxy
    command: ["/e2e/run.sh"]

  provider:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.e2e
    depends_on:
      server:
        condition: service_started
    networks:
      - proxyfoxy
    entrypoint: ["proxyfoxy", "provider", "res_user:res_pass@server:9000", "--quiet"]

networks:
  proxyfoxy:
