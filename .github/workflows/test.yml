name: E2E Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  e2e:
    name: Proxy E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E suite
        run: cd e2e && docker compose up --build --abort-on-container-exit

      - name: Logs (on failure)
        if: failure()
        run: cd e2e && docker compose logs
